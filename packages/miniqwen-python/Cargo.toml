[package]
name = "miniqwen-python"
version = "0.1.0"
edition = "2021"

[lib]
name = "miniqwen_python"
crate-type = ["cdylib"]

[dependencies]
qwen-core = { path = "../qwen-core" }
pyo3 = { version = "0.22", features = ["extension-module"] }
anyhow = "1.0"
tokenizers = "0.20"
ort = { version = "2.0.0-rc.9", features = ["ndarray"] }
image = "0.25.10"
serde_json = "1.0"
