[package]
name = "qwen-cli"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "qwen-cli"
path = "src/main.rs"

[dependencies]
qwen-core = { path = "../qwen-core" }
anyhow = "1.0"
clap = { version = "4.0", features = ["derive"] }
tokenizers = "0.20"
ort = { version = "2.0.0-rc.9", features = ["ndarray"] }
image = "0.25.10"
serde_json = "1.0"
