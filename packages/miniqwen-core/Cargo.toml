[package]
name = "miniqwen-core"
version.workspace = true
edition.workspace = true

[lib]
name = "miniqwen_core"
path = "src/lib.rs"

[dependencies]
ort = { version = "2.0.0-rc.9", features = ["ndarray"] }
tokenizers = { workspace = true }
ndarray = "0.15.6"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
image = "0.25.10"
ndarray-stats = "0.7.0"
minijinja = { version = "2", features = ["builtins", "json"] }
tracing = "0.1"
memory-stats = "1.2"
