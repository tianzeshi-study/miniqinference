[package]
name = "miniqwen-python"
version.workspace = true
edition.workspace = true

[lib]
name = "miniqwen_python"
crate-type = ["cdylib"]

[dependencies]
miniqwen-core = { path = "../miniqwen-core" }
pyo3 = { version = "0.22", features = ["extension-module", "abi3-py38", "generate-import-lib"] }
anyhow = "1.0"
tokenizers = { workspace = true }
ort = { version = "2.0.0-rc.9", features = ["ndarray"] }
image = "0.25.10"
serde_json = "1.0"
