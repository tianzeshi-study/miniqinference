[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "miniqinference"
version = "0.1.1"
description = "MiniQ Inference Toolkit"
readme = "README.md"
requires-python = ">=3.7"
dependencies = []

[project.optional-dependencies]
cli = ["miniqwen-cli"]
server = ["miniqwen-server"]
all = ["miniqwen-cli", "miniqwen-server"]

[tool.hatch.build.targets.wheel]
packages = ["src/miniqinference"]
