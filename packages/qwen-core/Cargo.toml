[package]
name = "qwen-core"
version = "0.1.0"
edition = "2021"

[lib]
name = "qwen_core"
path = "src/lib.rs"

[dependencies]
ort = { version = "2.0.0-rc.9", features = ["ndarray"] }
tokenizers = { workspace = true }
ndarray = "0.15.6"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
image = "0.25.10"
ndarray-stats = "0.7.0"
minijinja = { version = "2", features = ["builtins", "json"] }
